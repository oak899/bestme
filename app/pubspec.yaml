name: bestme
description: GrowthOS (BestMe) - 个人成长 + 工作计划 + 任务管理.
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  intl: ^0.19.0
  provider: ^6.1.2
  go_router: ^14.2.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/logo.png"
  web:
    generate: true
    background_color: "#4F46E5"
    theme_color: "#4F46E5"
  macos:
    generate: true
  windows:
    generate: true

flutter_native_splash:
  color: "#F8FAFC"
  color_dark: "#0B1120"
  image: "assets/logo.png"
  image_dark: "assets/logo.png"
  android_12:
    color: "#F8FAFC"
    color_dark: "#0B1120"
    image: "assets/logo.png"
    image_dark: "assets/logo.png"
  web: true
