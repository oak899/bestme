# BestMe — isolated site; does not modify vivid/iwell/reson/livekit configs.
# TLS certs: certbot --nginx -d bestme.zfloo.com
server {
    server_name bestme.zfloo.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/bestme.zfloo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bestme.zfloo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = bestme.zfloo.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name bestme.zfloo.com;
    return 404;
}
